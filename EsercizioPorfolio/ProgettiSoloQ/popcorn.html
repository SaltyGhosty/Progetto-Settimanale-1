<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Popcorn fall</title>
  <link rel="icon" type="image/x-icon"
    href="https://static.vecteezy.com/system/resources/previews/060/380/123/non_2x/detailed-top-view-of-single-fluffy-popcorn-kernel-with-crispy-texture-and-golden-caramel-center-on-isolated-background-for-snack-food-packaging-and-advertising-use-png.png" />
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at center, #111 0%, #000 100%);
      font-family: 'Roboto', sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* Resplandor naranja suave en los bordes */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 70%, rgba(255, 140, 0, 0.2) 100%);
      filter: blur(60px);
      pointer-events: none;
      pointer-events: none;
    }

    /* Letras de fondo difuminadas */
    body::after {
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(30px, 10vw, 150px);
      /* mínimo 30px, máximo 150px */
      font-weight: bold;
      color: rgba(255, 255, 255, 0.05);
      letter-spacing: clamp(5px, 1vw, 20px);
      /* proporcional al tamaño */
      text-align: center;
      content: "THE SPACE CINEMA";
      position: absolute;
      top: 50%;

      white-space: nowrap;
      user-select: none;
      pointer-events: none;
      filter: blur(6px);
      max-width: 95%;
      /* evita que se salga del contenedor */
      overflow: hidden;
    }

    #container {
      position: relative;
      width: 100%;
      height: 100vh;
      border: transparent;
      overflow: visible;
      background: transparent;
    }

    /* Ajuste adicional para móviles */
    @media (max-width: 600px) {
      body::after {
        white-space: normal;
        /* permite que se divida en varias líneas */
        line-height: 1.1;
        font-size: clamp(20px, 15vw, 60px);
        letter-spacing: 2px;
      }
    }

    /* Palomitas */
    .popcorn {
      opacity: 1;
      display: none;
      position: fixed;
      width: 8vw;
      height: 8vw;
      max-width: 60px;
      max-height: 60px;
      will-change: transform;
      background-image: url('https://static.vecteezy.com/system/resources/previews/060/380/123/non_2x/detailed-top-view-of-single-fluffy-popcorn-kernel-with-crispy-texture-and-golden-caramel-center-on-isolated-background-for-snack-food-packaging-and-advertising-use-png.png');
      background-size: cover;
      background-position: center;
      border-radius: 50%;
      animation: fall 10s linear infinite;
      cursor: pointer;
      pointer-events: auto;
    }

    .popcorn.show {
      display: block;
    }

    /* Animación de caída */
    @keyframes fall {
      from {
        transform: translateY(-100vh) rotate(0deg);
      }

      to {
        transform: translateY(100vh) rotate(360deg);
      }
    }

    /* Animación de acumulación */
    @keyframes accumulate {
      from {
        transform: translateY(0) scale(1);
        z-index: 10;

      }

      to {
        transform: translateY(100vh) scale(1);
        z-index: 20;

      }
    }
  </style>
</head>

<body>
  <div id="container"></div>
  <script src="script.js"></script>
  <script src="anime.min.js"></script>
  <script>
    const nupopcorn = 60;  // Número de palomitas a generar
    const container = document.getElementById('container');  // Contenedor de las palomitas
    const popcorns = [];

    for (let i = 0; i < nupopcorn; i++) { // Bucle para generar las palomitas
      const popcorn = document.createElement('div');
      popcorn.className = 'popcorn';
      popcorn.style.left = Math.random() * (window.innerWidth - 50) + 'px';
      popcorn.style.top = '-' + (Math.random() * 100 + 60) + 'px';
      popcorn.style.animationDelay = Math.random() * 10 + 's';
      popcorn.style.animationDuration = 6 + Math.random() * 2 + 's';
      popcorn.onclick = () => {
        window.open('https://www.thespacecinema.it/cinema/silea/al-cinema', '_blank');
      };
      container.appendChild(popcorn);
      popcorn.classList.add('show');

    }
  </script>
</body>

</html>
